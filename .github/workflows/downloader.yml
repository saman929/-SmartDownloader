name: SmartDownloader - PyTorch Ultra v6.0

on:
  workflow_dispatch:
    inputs:
      python_ver:
        description: 'Python Version (e.g. 3.10 or 3.11)'
        required: true
        default: '3.11'

      cuda_ver:
        description: 'CUDA Version (e.g. cu121 or cu118 or cpu)'
        required: true
        default: 'cu121'

      torch_ver:
        description: 'Torch Version'
        required: true
        default: '2.2.2'

permissions:
  contents: write

jobs:
  ultra:
    runs-on: ubuntu-latest

    steps:
      - name: 🧠 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python_ver }}

      - name: 📥 Download PyTorch Wheels (via pip)
        run: |
          set -e
          mkdir -p downloads

          CUDA="${{ github.event.inputs.cuda_ver }}"
          TORCH="${{ github.event.inputs.torch_ver }}"

          echo "🔥 Downloading torch, torchvision, torchaudio"
          echo "Python = ${{ github.event.inputs.python_ver }}"
          echo "CUDA = $CUDA"

          pip download torch=="$TORCH" torchvision torchaudio --index-url https://download.pytorch.org/whl/$CUDA -d downloads/

          echo "📦 Files downloaded:"
          ls -lh downloads

      - name: 🧩 Commit & Push
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

          git add downloads/
          git commit -m "🔥 PyTorch WHL downloaded via Ultra v6.0" || true
          git push
