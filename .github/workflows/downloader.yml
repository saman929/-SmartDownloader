name: SmartDownloader - Ultra-Input v5.2

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌ها را با کاما جدا کن'
        required: true
        default: 'https://download.pytorch.org/whl/cu121/torch-2.2.2+cu121-cp311-cp311-win_amd64.whl'

permissions:
  contents: write

jobs:
  ultra:
    runs-on: ubuntu-latest

    steps:
      - name: 🧠 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Smart Download
        run: |
          set -e
          mkdir -p downloads
          IFS=',' read -ra URLS <<< "${{ github.event.inputs.urls }}"
          for URL in "${URLS[@]}"; do
            URL=$(echo "$URL" | xargs)
            echo "⬇️ Downloading: $URL"
            wget --continue --tries=15 --timeout=60 --retry-connrefused \
                 --waitretry=5 --show-progress "$URL" -P downloads/
          done

      - name: 🧩 Commit & Push (SecureZIP fallback)
        run: |
          set -e
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

          git add downloads/
          git commit -m "🚀 New downloads added [$(date +'%Y-%m-%d %H:%M')]" || echo "Nothing to commit"

          git push || (
            echo "⚠️ Push failed → ZIP fallback activated"

            TS=$(date +%s)
            ZIP_PATH="/tmp/archive_${TS}.zip"

            zip -r "$ZIP_PATH" downloads/
            rm -rf downloads/*
            mv "$ZIP_PATH" "downloads/archive_${TS}.zip"

            git add downloads/
            git commit -m "🧩 ZIP Fallback applied"
            git push
          )
