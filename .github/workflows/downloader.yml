name: SmartDownloader - Ultra Mode

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Space-separated URLs to download"
        required: true
        type: string

      mode:
        description: "Download mode (normal or zip)"
        default: "normal"
        type: choice
        options: [normal, zip]

      split_threshold_mb:
        description: "Split large files > X MB (0 = no split)"
        default: 100
        type: number

jobs:
  ultra:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install download tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl jq

      - name: Launch SmartDownloader
        run: echo "🚀 SmartDownloader Ultra Mode started"

      - name: Run Ultra logic
        run: |
          set -e

          URLS=(${{ github.event.inputs.urls }})
          MODE="${{ github.event.inputs.mode }}"
          SPLIT_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))

          mkdir -p downloads tmp chunks

          use_curl() {
            [[ "$1" =~ pytorch|huggingface|googleapis|cdn|redirect|\.whl$ ]]
          }

          ultra_download() {
            URL="$1"
            FILE="$2"
            echo "🔽 Downloading: $URL"

            for ATTEMPT in {1..15}; do
              echo "🔁 Attempt $ATTEMPT"

              if use_curl "$URL"; then
                curl -L --fail --retry 5 --retry-delay 2 \
                     -o "tmp/$FILE" "$URL" && break
              else
                aria2c --allow-overwrite=true --continue=true \
                       --max-connection-per-server=4 --split=4 \
                       --min-split-size=10M --dir="tmp" --out="$FILE" "$URL" && break
              fi

              sleep $((ATTEMPT * 3))
            done

            if [ ! -s "tmp/$FILE" ] || file tmp/$FILE | grep -qi "HTML"; then
              echo "⚠️ Invalid or HTML file detected → chunk mode"
              rm -f "tmp/$FILE"
              rm -f chunks/*

              CHUNK_SIZE=20M
              for CH in {0..20}; do
                START=$((CH * 20 * 1024 * 1024))
                END=$((START + 20 * 1024 * 1024 - 1))

                curl -L --fail --range "$START-$END" "$URL" \
                     -o "chunks/chunk_$CH" || break

                [ ! -s "chunks/chunk_$CH" ] && break
              done

              cat chunks/chunk_* > "tmp/$FILE"
            fi

            [ ! -s "tmp/$FILE" ] && { echo "❌ FAILED: $URL"; exit 1; }
            echo "✅ OK: $FILE"
          }

          for URL in "${URLS[@]}"; do
            FILE=$(basename "$URL")
            ultra_download "$URL" "$FILE"
          done

          if [ "$MODE" = "zip" ]; then
            ZIPNAME="downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ZIPNAME" tmp/*
          else
            for F in tmp/*; do
              SIZE=$(stat -c%s "$F")
              BASE=$(basename "$F")

              if [ "$SPLIT_BYTES" -gt 0 ] && [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
                zip -0 -s "${SPLIT_MB}m" "downloads/${BASE}.zip" -j "$F"
              else
                cp "$F" downloads/
              fi
            done
          fi

          rm -rf tmp chunks

      - name: Commit & push batches
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          BRANCH="${GITHUB_REF_NAME}"
          FILES=($(git ls-files --others --modified --exclude-standard downloads/))
          [ ${#FILES[@]} -eq 0 ] && exit 0

          BATCH=5
          COUNT=0
          for ((i=0;i<${#FILES[@]};i+=BATCH)); do
            COUNT=$((COUNT+1))
            PART=("${FILES[@]:i:BATCH}")
            git add "${PART[@]}"
            git commit -m "SmartDownloader batch $COUNT [skip ci]"
            git pull --rebase origin "$BRANCH"
            git push origin HEAD:"$BRANCH"
          done

          echo "🎉 SmartDownloader finished: $COUNT batch(es) uploaded"
